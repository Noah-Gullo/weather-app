<!doctype html><html><head><meta charset="UTF-8"/><title>Weather App</title><script defer="defer" src="main.js"></script></head><body><h1>Weather App</h1><form><input id="locationField" placeholder="Enter a location" autofocus required> <button id="searchButton">Search</button></form><div id="dataDisplay"><h2 id="location">London</h2><div id="info"><img id="icon"><div id="temperatureInfo"><h2 id="temperature">60</h2><button id="fahrenheit">&deg;F</button><p>|</p><button id="celsius">&deg;C</button></div></div><div id="miscInfo"><div id="left"><p id="precipitation">Precipitation: 0%</p><p id="humidity">Humidity: 50%</p><p id="wind">Wind Speed: 2.0mph</p></div><div id="right"><p id="condition">Condition: Clear</p><p id="date">Thur, Jan 1, 1970 12:00am</p><p id="description">Description: Clear conditions throughout the day</p></div></div></div><p id="errorText" visible="false"></p></body></html>
