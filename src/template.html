<!doctype html>

<html>
  <head>
    <meta charset="UTF-8" />
    <title>Weather App</title>
  </head>

  <body>
    <h1>Weather App</h1>
    <form>
      <input id="locationField" type="text" placeholder="Enter a location" autofocus required></input>
      <button id="searchButton">Search</button>
    </form>
    
    <div id="dataDisplay">
      <h2 id="location">London</h2>
      <div id="iconTemp">

      </div>
      <div id="miscInfo">
        <div id="left">
          <p id="precipitation">Precipitation: 0%</p>
          <p id="humidity">Humidity: 50%</p>
          <p id="wind">Wind Speed: 2mph</p>
        </div>
        <div id="right">
          <p id="condition">Condition: Clear</p>
          <p id="date">Thur, Jan 1, 1970 12:00am</p>
          <p id="description">Description: Clear conditions throughout the day</p>
        </div>
      </div>
    </div>

    <p id="errorText" visible="false"></p>
  </body>
</html>
